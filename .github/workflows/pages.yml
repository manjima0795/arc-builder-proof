name: Deploy static app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Compile contracts and test
        run: npm run compile && npm test
      - name: Build frontend
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_CONTRACT_ADDRESS: ${{ vars.VITE_CONTRACT_ADDRESS }}
          VITE_ARC_CHAIN_ID: ${{ vars.VITE_ARC_CHAIN_ID }}
          VITE_ARC_CHAIN_NAME: ${{ vars.VITE_ARC_CHAIN_NAME }}
          VITE_ARC_RPC_URL: ${{ vars.VITE_ARC_RPC_URL }}
          VITE_ARC_BLOCK_EXPLORER: ${{ vars.VITE_ARC_BLOCK_EXPLORER }}
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
